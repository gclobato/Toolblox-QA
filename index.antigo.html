<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolblox - QA </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .tool {
            margin-bottom: 20px;
        }
        .tool label {
            display: block;
            margin-bottom: 5px;
        }
        .tool input, .tool textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }
        .tool button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        .tool button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Toolblox - QA</h1>

    <div class="tool">
        <h2>Remover Espaços e Caracteres Especiais</h2>
        <label for="inputNumber">Insira o número:</label>
        <input type="text" id="inputNumber" placeholder="Digite o número aqui">
        <button onclick="removeSpacesAndSpecialChars()">Remover</button>
        <label for="outputNumber">Resultado:</label>
        <input type="text" id="outputNumber" readonly>
    </div>

    <div class="tool">
        <h2>Conversor de Texto para Maiúsculas</h2>
        <label for="inputText">Insira o texto:</label>
        <textarea id="inputText" rows="4" placeholder="Digite o texto aqui"></textarea>
        <button onclick="convertToUpperCase()">Converter</button>
        <label for="outputText">Resultado:</label>
        <textarea id="outputText" rows="4" readonly></textarea>
    </div>

    <script>
        function removeSpacesAndSpecialChars() {
            const input = document.getElementById('inputNumber').value;
            const output = input.replace(/[\s\-\/\.]/g, '');
            document.getElementById('outputNumber').value = output;
        }

        function convertToUpperCase() {
            const input = document.getElementById('inputText').value;
            const output = input.toUpperCase();
            document.getElementById('outputText').value = output;
        }
    </script>
</body>
</html>
