<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerador de Massa de Dados</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Gerador de Massa de Dados</h1>
    <div class="controls">
      <label for="type-select">Tipo de dado:</label>
      <select id="type-select">
        <option value="pessoa">Pessoa</option>
        <option value="cnpj">CNPJ</option>
        <option value="veiculo">Veículo</option>
      </select>

      <label for="quantity-input">Quantidade:</label>
      <input type="number" id="quantity-input" value="5" min="1" max="100" />

      <button id="generate-btn">Gerar</button>
    </div>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
